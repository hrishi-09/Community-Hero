{% extends "base.html" %}
{% block content %}
<section class="auth-card">
  <span class="role-eyebrow">Public login</span>
  <h1>Welcome back</h1>
  <form method="POST" class="form">
    <label>Email or phone number
      <input type="text" name="identifier" required autofocus>
    </label>
    <label>Password
      <input type="password" name="password" required autocomplete="current-password">
    </label>
    <button type="submit" class="btn btn-primary btn-block">Log in</button>
  </form>
  <p class="auth-switch">New here? <a href="{{ url_for('register') }}">Create a citizen account</a></p>
  <p class="auth-switch">Police station admin? <a href="{{ url_for('admin_login') }}">Admin login</a></p>
</section>
{% endblock %}

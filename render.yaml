services:
  # ── Backend API (Python / FastAPI) ──────────────────
  - type: web
    name: community-hero-api
    env: python
    region: singapore
    plan: free
    buildCommand: |
      pip install -r requirements.txt
      cd frontend && npm install && npm run build
    startCommand: python app.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: community-hero-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ENV
        value: production
      - key: SMS_PROVIDER
        value: twilio            # change to msg91 if preferred
      - key: TWILIO_ACCOUNT_SID
        sync: false              # fill in Render dashboard
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false

  # ── PostgreSQL Database ─────────────────────────────
databases:
  - name: community-hero-db
    databaseName: community_hero
    user: community_hero
    region: singapore
    plan: free
